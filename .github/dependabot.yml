# Dependabot — automated dependency updates
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # ── Gradle dependencies (version catalog + build scripts) ──────────────
  - package-ecosystem: "gradle"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"

    # Group related updates to reduce PR noise
    groups:
      androidx-compose:
        patterns:
          - "androidx.compose:*"
          - "androidx.compose.ui:*"
          - "androidx.compose.material:*"
          - "androidx.compose.material3:*"
        update-types:
          - "minor"
          - "patch"

      androidx-core:
        patterns:
          - "androidx.core:*"
          - "androidx.activity:*"
          - "androidx.lifecycle:*"
          - "androidx.navigation:*"
          - "androidx.room:*"
        update-types:
          - "minor"
          - "patch"

      # Kotlin + AGP + KSP are critical build deps — update individually
      # so we can test each upgrade before combining

  # ── Gradle wrapper ─────────────────────────────────────────────────────
  - package-ecosystem: "gradle-wrapper"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "gradle-wrapper"
    commit-message:
      prefix: "chore(gradle-wrapper):"

  # ── GitHub Actions ─────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "chore(ci):"
