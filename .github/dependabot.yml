# Dependabot configuration for automatic dependency updates
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Android Gradle Plugin, Kotlin, KSP, and other Gradle plugins
  - package-ecosystem: "gradle"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    # Version catalog (libs.versions.toml) + build.gradle.kts
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "chore(deps):"
    # Group compatible minor/patch updates to reduce PR noise
    groups:
      androidx:
        patterns:
          - "androidx.*"
        update-types:
          - "minor"
          - "patch"
      compose:
        patterns:
          - "androidx.compose.*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions (if added later)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "dependencies"
    commit-message:
      prefix: "chore(ci):"
