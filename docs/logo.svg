<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338CA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="filament" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E9D5FF"/>
      <stop offset="50%" style="stop-color:#C084FC"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="hub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.2"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="0" y="0" width="512" height="512" rx="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

    <!-- Filament winding - multiple concentric coils -->
    <circle cx="145" cy="256" r="115" fill="none" stroke="url(#filament)" stroke-width="7" opacity="0.9"/>
    <circle cx="145" cy="256" r="105" fill="none" stroke="url(#filament)" stroke-width="6" opacity="0.75"/>
    <circle cx="145" cy="256" r="95" fill="none" stroke="url(#filament)" stroke-width="6" opacity="0.6"/>
    <circle cx="145" cy="256" r="85" fill="none" stroke="url(#filament)" stroke-width="6" opacity="0.45"/>
    <circle cx="145" cy="256" r="75" fill="none" stroke="url(#filament)" stroke-width="6" opacity="0.3"/>
    <circle cx="145" cy="256" r="65" fill="none" stroke="url(#filament)" stroke-width="5" opacity="0.2"/>

    <!-- Spool inner hub -->
    <circle cx="145" cy="256" r="42" fill="url(#hub)"/>
    <circle cx="145" cy="256" r="20" fill="#4338CA"/>

    <!-- RFID waves -->
    <path d="M 295 198 A 86 86 0 0 1 295 314"
          fill="none" stroke="url(#wave)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 339 154 A 130 130 0 0 1 339 358"
          fill="none" stroke="url(#wave)" stroke-width="12" stroke-linecap="round"/>
    <path d="M 383 110 A 174 174 0 0 1 383 402"
          fill="none" stroke="url(#wave)" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
